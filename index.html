<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>CyberTerminal v1.0</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="terminal">
        <div id="output">
            <div class="line">SYSTEM BOOT SUCCESSFUL...</div>
            <div class="line">Vítejte v rozhraní CyberGrid. Zadejte 'help' pro seznam příkazů.</div>
        </div>
        <div class="input-line">
            <span class="prompt">guest@cybernet:~$</span>
            <input type="text" id="commandInput" autofocus spellcheck="false">
        </div>
    </div>
    <script src="world.js"></script>
    <script src="terminal.js"></script>
</body>
</html>
